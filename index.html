<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>BEAST Code</title>
    <style>
        /* 画面全体のスクロールとプルダウン更新を抑制するスタイル */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* スクロールを禁止 */
            overscroll-behavior: none; /* iPhoneの戻る/進むジェスチャー抑制を試みる */
        }
    </style>
</head>
<body>
    <script>
        // 即時リダイレクト
        window.location.replace("https://willowy-pony-db40b6.netlify.app");

        // 念のため、タッチイベントのデフォルト動作をキャンセルして更新を阻止
        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
